name: Fetch coach photos

# Run manually from the Actions tab, and automatically whenever the script changes.
on:
  workflow_dispatch:
  push:
    paths:
      - fetch_photos.py
      - .github/workflows/photos.yml

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Pillow
        run: pip install --quiet pillow

      - name: Download the photos
        run: python fetch_photos.py

      - name: Commit any new/updated images
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add images
          if git diff --cached --quiet; then
            echo "No image changes to commit."
          else
            git commit -m "Update coach photos"
            git push
          fi
